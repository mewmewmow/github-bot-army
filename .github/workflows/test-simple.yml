name: 🧪 Simple Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "=== Testing GH_PAT ==="
          python3 << 'PYTHON'
import os
import sys
print(f"GH_PAT exists: {bool(os.environ.get('GH_PAT'))}")
print(f"GH_PAT length: {len(os.environ.get('GH_PAT', ''))}")
print(f"SMTP_HOST: {os.environ.get('SMTP_HOST', 'NOT SET')}")
print(f"EMAIL_TO: {os.environ.get('EMAIL_TO', 'NOT SET')}")

# Try importing PyGithub
try:
    from github import Github
    print("✓ PyGithub imported")
    g = Github(os.environ.get('GH_PAT', ''))
    user = g.get_user()
    print(f"✓ Authenticated as: {user.login}")
    print(f"✓ Total repos: {user.get_repos().totalCount}")
except Exception as e:
    print(f"✗ Error: {e}")
    import traceback
    traceback.print_exc()
    sys.exit(1)
print("✅ All tests passed!")
PYTHON
