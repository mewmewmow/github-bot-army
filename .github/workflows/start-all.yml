name: 🚀 START ALL BOTS

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  trigger-all:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🚀 Trigger All Bots
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          REPO="mewmewmow/github-bot-army"
          
          WORKFLOWS=(
            "repo-doctor.yml"
            "security-sentinel.yml"
            "api-key-hunter.yml"
            "web-scraper.yml"
            "analytics-bot.yml"
            "update-bot.yml"
            "agent-builder.yml"
            "master-report.yml"
            "bot-health.yml"
          )
          
          echo "🚀 TRIGGERING ALL BOTS..."
          echo "=========================="
          
          for wf in "${WORKFLOWS[@]}"; do
            echo ""
            echo "Triggering: $wf"
            gh workflow run "$wf" --repo "$REPO" 2>&1 && echo "✅ $wf triggered!" || echo "❌ Failed: $wf"
            sleep 2
          done
          
          echo ""
          echo "=========================="
          echo "✅ ALL BOTS TRIGGERED!"
          echo ""
          echo "Waiting 10 seconds for runs to start..."
          sleep 10
          
          echo ""
          echo "📊 RECENT RUNS:"
          gh run list --repo "$REPO" --limit 15
