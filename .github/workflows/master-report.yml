name: 📬 Master Daily Report

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  daily-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install PyGithub

      - name: 📬 Generate Master Report
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          python3 -c "
import os, json
from github import Github

g = Github(os.environ['GH_PAT'])
user = g.get_user()

total = 0
stars = 0
forks = 0
for r in user.get_repos():
    if r.fork: continue
    total += 1
    stars += r.stargazers_count
    forks += r.forks_count

print(f'📊 Total: {total} repos, ⭐ {stars} stars, 🍴 {forks} forks')

os.makedirs('data', exist_ok=True)
with open('data/master_report.json', 'w') as f:
    json.dump({'total': total, 'stars': stars, 'forks': forks}, f)

print('✅ Report generated!')
"

      - name: 💾 Commit
        run: |
          git config user.name "Bot"
          git config user.email "bot@github-bot-army.dev"
          git add data/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "📬 Report" || true
          git push || true
