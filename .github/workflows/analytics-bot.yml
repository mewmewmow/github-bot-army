name: 📊 Analytics Bot

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  analytics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install PyGithub
      - name: 📊 Generate Analytics
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          python3 -c "
import os, json
from github import Github

g = Github(os.environ['GH_PAT'])
user = g.get_user()
repos = list(user.get_repos())

print(f'Found {len(repos)} repos')

stats = {'total': len(repos), 'stars': sum(r.stargazers_count for r in repos)}
print(f'Total: {stats["total"]}, Stars: {stats["stars"]}')

os.makedirs('data', exist_ok=True)
with open('data/analytics.json', 'w') as f:
    json.dump(stats, f)

print('✅ Done!')
"

      - name: 💾 Commit
        run: |
          git config user.name "Analytics Bot"
          git config user.email "bot@github-bot-army.dev"
          git add data/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "📊 Analytics" || true
          git push || true
