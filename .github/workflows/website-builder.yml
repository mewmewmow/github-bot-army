              <p>{datetime.now().strftime('%Y-%m-%d %H:%M UTC')}</p><hr style="border-color:#30363d">
              <h2>{project['name'].replace('-',' ').title()}</h2>
              <p>{project['description']}</p>
              <div style="background:#0d1117;padding:20px;border-radius:8px;margin:20px 0">
              <p>🌐 <b>Live Website:</b><br><a href="{live_url}" style="color:#58a6ff;font-size:1.1rem">{live_url}</a></p>
              <br>
              <p>📦 <b>Source Code:</b><br><a href="{repo_url}" style="color:#58a6ff;font-size:1.1rem">{repo_url}</a></p>
              </div>
              <p>Type: <b>{project['type']}</b></p>
              <p>Built by: 🤖 GitHub Bot Army</p>
              </div></body></html>"""
              notify(f"New Project: {project['name']} — {live_url}", html)

          except Exception as e:
              print(f"❌ Error: {e}")
              traceback.print_exc()
          PYTHON