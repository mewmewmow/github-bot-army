name: 🌐 Website Builder Bot

on:
  schedule:
    - cron: '0 2 * * 1'  # Weekly Monday 2am UTC
  workflow_dispatch:
    inputs:
      project_type:
        description: 'Type of project to build'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - landing-page
          - portfolio
          - saas-dashboard
          - blog
          - ecommerce
          - mobile-app
          - api-service

permissions:
  contents: write
  pages: write
  id-token: write
  actions: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 Install
        run: pip install PyGithub requests

      - name: 🌐 Build & Deploy Project
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PROJECT_TYPE: ${{ github.event.inputs.project_type }}
        run: |
          python3 << 'PYTHON'
          import os, json, smtplib, urllib.request, base64, traceback
          from datetime import datetime
          from email.mime.text import MIMEText
          from email.mime.multipart import MIMEMultipart
          from github import Github, GithubException

          # ---- Notification ----
          def notify(subject, html):
              channels = {}
              # Email
              try:
                  cfg = {k: os.environ.get(k,'') for k in ['SMTP_HOST','SMTP_PORT','SMTP_USER','SMTP_PASS','EMAIL_FROM','EMAIL_TO']}
                  if all([cfg['SMTP_HOST'], cfg['SMTP_USER'], cfg['SMTP_PASS'], cfg['EMAIL_TO']]):
                      msg = MIMEMultipart("alternative")
                      msg["Subject"] = f"🌐 {subject}"
                      msg["From"] = cfg['EMAIL_FROM'] or cfg['SMTP_USER']
                      msg["To"] = cfg['EMAIL_TO']
                      msg.attach(MIMEText(html, "html"))
                      with smtplib.SMTP(cfg['SMTP_HOST'], int(cfg['SMTP_PORT'] or 587)) as s:
                          s.starttls(); s.login(cfg['SMTP_USER'], cfg['SMTP_PASS']); s.send_message(msg)
                      channels["email"] = "✅"
              except Exception as e: channels["email"] = f"❌ {e}"
              # Telegram
              try:
                  t = os.environ.get('TELEGRAM_BOT_TOKEN',''); c = os.environ.get('TELEGRAM_CHAT_ID','')
                  if t and c:
                      text = f"🌐 *{subject}*\n\nCheck your email for the full report with links!"
                      url = f"https://api.telegram.org/bot{t}/sendMessage"
                      data = json.dumps({"chat_id": c, "text": text, "parse_mode": "Markdown"}).encode()
                      req = urllib.request.Request(url, data=data, headers={"Content-Type":"application/json"})
                      urllib.request.urlopen(req, timeout=10)
                      channels["telegram"] = "✅"
              except: pass
              # Discord
              try:
                  wh = os.environ.get('DISCORD_WEBHOOK_URL','')
                  if wh:
                      embed = {"embeds":[{"title":f"🌐 {subject}","description":"New project deployed! Check email for links.","color":5763719,"timestamp":datetime.utcnow().isoformat()}]}
                      data = json.dumps(embed).encode()
                      req = urllib.request.Request(wh, data=data, headers={"Content-Type":"application/json"})
                      urllib.request.urlopen(req, timeout=10)
                      channels["discord"] = "✅"
              except: pass
              print(f"📬 Notifications: {channels}")

          # ---- Project Templates ----
          PROJECTS = [
              {
                  "name": "landing-page-ai",
                  "type": "landing-page",
                  "description": "Beautiful AI-themed landing page with animations",
                  "files": {
                      "index.html": '''<!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>AI Landing Page</title>
            <style>
              * { margin: 0; padding: 0; box-sizing: border-box; }
              body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #0d1117 0%, #161b22 100%); color: #c9d1d9; min-height: 100vh; }
              .hero { text-align: center; padding: 100px 20px; }
              h1 { font-size: 3.5rem; background: linear-gradient(90deg, #58a6ff, #bc8cff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }
              p { font-size: 1.3rem; color: #8b949e; max-width: 600px; margin: 0 auto 40px; }
              .btn { background: linear-gradient(90deg, #58a6ff, #bc8cff); color: white; border: none; padding: 15px 40px; font-size: 1.1rem; border-radius: 8px; cursor: pointer; transition: transform 0.2s; }
              .btn:hover { transform: scale(1.05); }
              .features { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; padding: 60px 40px; max-width: 1200px; margin: 0 auto; }
              .feature { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 30px; text-align: center; }
              .feature h3 { color: #58a6ff; margin-bottom: 10px; }
              .feature p { color: #8b949e; font-size: 0.95rem; }
              footer { text-align: center; padding: 40px; color: #484f58; }
            </style>
          </head>
          <body>
            <div class="hero">
              <h1>🚀 Welcome to the Future</h1>
              <p>AI-powered solutions for the modern world. Built with cutting-edge technology.</p>
              <button class="btn">Get Started Free</button>
            </div>
            <div class="features">
              <div class="feature"><h3>⚡ Fast</h3><p>Lightning-fast performance optimized for speed.</p></div>
              <div class="feature"><h3>🔒 Secure</h3><p>Enterprise-grade security built in from day one.</p></div>
              <div class="feature"><h3>🤖 AI-Powered</h3><p>Smart automation that learns and adapts.</p></div>
              <div class="feature"><h3>📱 Responsive</h3><p>Works beautifully on all devices.</p></div>
            </div>
            <footer>Built by GitHub Bot Army 🤖</footer>
          </body>
          </html>'''
                  }
              },
              {
                  "name": "portfolio-modern",
                  "type": "portfolio",
                  "description": "Modern developer portfolio with dark theme",
                  "files": {
                      "index.html": '''<!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Developer Portfolio</title>
            <style>
              * { margin: 0; padding: 0; box-sizing: border-box; }
