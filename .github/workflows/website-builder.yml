          </body>
          </html>'''
                  }
              }
          ]

          try:
              g = Github(os.environ['GH_PAT'])
              user = g.get_user()
              ptype = os.environ.get('PROJECT_TYPE', 'auto').strip()
              existing = [r.name for r in user.get_repos()]

              print("🌐 Website Builder Bot — Creating and deploying projects...")

              if ptype == 'auto':
                  # Pick first project that doesn't exist
                  project = None
                  for p in PROJECTS:
                      if p['name'] not in existing:
                          project = p
                          break
                  if not project:
                      project = PROJECTS[0]
              else:
                  matching = [p for p in PROJECTS if p['type'] == ptype]
                  project = matching[0] if matching else PROJECTS[0]

              if project['name'] in existing:
                  print(f"⚠️ {project['name']} already exists. Creating variant...")
                  project['name'] = f"{project['name']}-{datetime.now().strftime('%m%d')}"

              print(f"\n🚀 Building: {project['name']}")
              print(f"📝 Type: {project['type']}")
              print(f"📄 Description: {project['description']}")

              # Create repo with GitHub Pages
              repo = user.create_repo(
                  project['name'],
                  description=project['description'],
                  auto_init=False,
                  private=False
              )
              print(f"✅ Repo created: https://github.com/{user.login}/{project['name']}")

              # Add files
              for filename, content in project['files'].items():
                  repo.create_file(filename, f"feat: add {filename}", content)
                  print(f"  ✅ Added {filename}")

              # Add README
              readme = f"# {project['name'].replace('-', ' ').title()}\n\n{project['description']}\n\n🌐 **Live URL:** https://{user.login}.github.io/{project['name']}/\n"
              repo.create_file("README.md", "docs: add README", readme)

              # Add topics
              repo.replace_topics([project['type'], 'website', 'html', 'css', 'bot-generated'])

              # Enable GitHub Pages via API
              try:
                  import urllib.request
                  token = os.environ['GH_PAT']
                  pages_data = json.dumps({"source": {"branch": "main", "path": "/"}}).encode()
                  req = urllib.request.Request(
                      f"https://api.github.com/repos/{user.login}/{project['name']}/pages",
                      data=pages_data,
                      headers={"Authorization": f"token {token}", "Accept": "application/vnd.github+json", "Content-Type": "application/json"},
                      method="POST"
                  )
                  urllib.request.urlopen(req)
                  print("✅ GitHub Pages enabled!")
              except Exception as e:
                  print(f"⚠️ Pages setup: {e}")

              live_url = f"https://{user.login}.github.io/{project['name']}/"
              repo_url = f"https://github.com/{user.login}/{project['name']}"

              print(f"\n🎉 PROJECT DEPLOYED!")
              print(f"🌐 Live URL: {live_url}")
              print(f"📦 Repo: {repo_url}")

              # Send notification with links
              html = f"""<html><body style="font-family:sans-serif;max-width:600px;margin:auto;padding:20px;background:#0d1117;color:#c9d1d9">
