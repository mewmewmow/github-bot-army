name: 🔐 Set SMTP Secrets

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  set-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: 🔐 Set Missing Secrets
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          REPO: mewmewmow/github-bot-army
        run: |
          echo "Setting SMTP secrets..."
          
          echo "smtp.gmail.com" | gh secret set SMTP_HOST --repo "$REPO"
          echo "✅ SMTP_HOST set"
          
          echo "587" | gh secret set SMTP_PORT --repo "$REPO"
          echo "✅ SMTP_PORT set"
          
          echo "caasiyatnilab@gmail.com" | gh secret set SMTP_USER --repo "$REPO"
          echo "✅ SMTP_USER set"
          
          echo "thankyou#77" | gh secret set SMTP_PASS --repo "$REPO"
          echo "✅ SMTP_PASS set"
          
          echo ""
          echo "🔐 All secrets configured!"
          echo ""
          echo "Verifying..."
          gh secret list --repo "$REPO"
          
          echo ""
          echo "🚀 Triggering all bots..."
          gh workflow run start-all.yml --repo "$REPO"
          echo "✅ Done! Check: https://github.com/$REPO/actions"
