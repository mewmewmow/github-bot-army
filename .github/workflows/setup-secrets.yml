name: 🔐 Setup Secrets

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  set-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: 🔐 Verify Secrets
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          REPO: mewmewmow/github-bot-army
        run: |
          echo "Checking secrets..."
          gh secret list --repo "$REPO"
          echo ""
          echo "✅ All secrets should be listed above."
          echo "If any are missing, add them via GitHub web UI:"
          echo "https://github.com/$REPO/settings/secrets/actions"
