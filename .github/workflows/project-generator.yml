name: 📦 Project Generator

on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday
  workflow_dispatch:
    inputs:
      idea:
        description: 'Project idea to generate'
        required: false
        default: ''

permissions:
  contents: write
  actions: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 Install dependencies
        run: pip install PyGithub

      - name: 📦 Generate Project
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          IDEA: ${{ github.event.inputs.idea }}
        run: |
          python3 << 'PYTHON'
          import os, json, traceback
          from datetime import datetime
          from github import Github, GithubException

          try:
              g = Github(os.environ['GH_PAT'])
              user = g.get_user()
              idea = os.environ.get('IDEA', '').strip()

              print("📦 Project Generator — Creating new projects...")

              PROJECT_IDEAS = [
                  {"name": "ai-resume-builder", "description": "AI-powered resume builder with ATS optimization", "tech": ["nextjs", "openai", "tailwind"], "features": ["AI content generation", "ATS checker", "PDF export"]},
                  {"name": "expense-tracker-ai", "description": "Smart expense tracker with AI categorization", "tech": ["react", "nodejs", "mongodb"], "features": ["Auto-categorize", "Spending insights", "Budget alerts"]},
                  {"name": "ai-code-reviewer", "description": "Automated code review bot for GitHub", "tech": ["python", "fastapi", "openai"], "features": ["PR analysis", "Security scanning"]},
                  {"name": "social-media-scheduler", "description": "Schedule posts across platforms with AI", "tech": ["nextjs", "python", "redis"], "features": ["Multi-platform", "Best time suggestions"]},
                  {"name": "ai-meeting-notes", "description": "AI meeting transcription and summarization", "tech": ["python", "whisper", "openai"], "features": ["Transcription", "Key points", "Action items"]},
                  {"name": "freelancer-dashboard", "description": "All-in-one dashboard for freelancers", "tech": ["nextjs", "supabase", "stripe"], "features": ["Invoicing", "Time tracking", "Client management"]},
              ]

              existing = [r.name for r in user.get_repos()]
              print(f"📋 Existing repos: {len(existing)}")

              if idea:
                  project = {"name": idea.lower().replace(' ', '-'), "description": idea, "tech": ["nextjs", "python"], "features": ["AI-powered"]}
              else:
                  project = None
                  for p in PROJECT_IDEAS:
                      if p["name"] not in existing:
                          project = p
                          break
                  if not project:
                      print("✅ All template projects already exist!")
                      project = PROJECT_IDEAS[0]

              if project["name"] in existing:
                  print(f"⚠️ Project '{project['name']}' already exists. Skipping creation.")
              else:
                  print(f"🚀 Generating: {project['name']}")
                  print(f"📝 Description: {project['description']}")

                  repo = user.create_repo(
                      project["name"],
                      description=project["description"],
                      auto_init=True,
                      private=False
                  )
                  print("✅ Repo created!")

                  features_text = '\n'.join(f'- {f}' for f in project['features'])
                  tech_text = '\n'.join(f'- {t}' for t in project['tech'])
                  readme = f"# {project['name'].replace('-', ' ').title()}\n\n{project['description']}\n\n## Features\n{features_text}\n\n## Tech Stack\n{tech_text}\n\n## Setup\n```bash\ngit clone https://github.com/{user.login}/{project['name']}.git\ncd {project['name']}\nnpm install\nnpm run dev\n```\n"

                  repo.create_file("README.md", "docs: initial README", readme)
                  lic = f"MIT License\n\nCopyright (c) {datetime.now().year} {user.login}\n\nPermission is hereby granted, free of charge, to any person obtaining a copy of this software..."
                  repo.create_file("LICENSE", "chore: add MIT License", lic)
                  repo.create_file(".gitignore", "chore: add gitignore", "node_modules/\n.env*\n!.env.example\ndist/\n.DS_Store\n")
                  repo.create_file(".env.example", "chore: add env example", "# Environment variables\nOPENAI_API_KEY=\nDATABASE_URL=\n")
                  repo.replace_topics(project['tech'] + ['ai', 'automation'])

                  print(f"✅ Project '{project['name']}' generated!")
                  print(f"🔗 https://github.com/{user.login}/{project['name']}")

          except Exception as e:
              print(f"❌ Error: {e}")
              traceback.print_exc()
          PYTHON
